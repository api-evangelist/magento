      name: v1-inventory-source-items
      description: REST surface for V1-inventory-source-items.
      operations:
      - method: GET
        name: listsourceitems
        description: List source item quantities
        call: rest-inventory.listsourceitems
        outputParameters:
        - type: object
          mapping: $.
