        method: GET
        description: List source item quantities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatesourceitems
        method: POST
        description: Update source item quantities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
