      type: bearer
      token: '{{env.MAGENTO_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-inventory-rest
    port: 8080
    description: REST adapter for Magento REST API — Inventory. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
