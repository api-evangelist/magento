naftiko: 1.0.0-alpha2
info:
  label: Magento REST API — Authentication
  description: 'Magento REST API — Authentication. 2 operations. Lead operation: Get admin authentication token. Self-contained
    Naftiko capability covering one Magento business surface.'
  tags:
  - Magento
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAGENTO_API_KEY: MAGENTO_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-authentication
    baseUri: https://{store_domain}/rest/{store_code}
    description: Magento REST API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: V1-integration-admin-token
      path: /V1/integration/admin/token
      operations:
      - name: createadmintoken
        method: POST
        description: Get admin authentication token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: V1-integration-customer-token
      path: /V1/integration/customer/token
      operations:
      - name: createcustomertoken
        method: POST
        description: Get customer authentication token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.MAGENTO_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-authentication-rest
    port: 8080
    description: REST adapter for Magento REST API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/v1/integration/admin/token
      name: v1-integration-admin-token
      description: REST surface for V1-integration-admin-token.
      operations:
      - method: POST
        name: createadmintoken
        description: Get admin authentication token
        call: rest-authentication.createadmintoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/v1/integration/customer/token
      name: v1-integration-customer-token
      description: REST surface for V1-integration-customer-token.
      operations:
      - method: POST
        name: createcustomertoken
        description: Get customer authentication token
        call: rest-authentication.createcustomertoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Magento REST API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-admin-authentication-token
      description: Get admin authentication token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: rest-authentication.createadmintoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-customer-authentication-token
      description: Get customer authentication token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: rest-authentication.createcustomertoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
