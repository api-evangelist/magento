naftiko: 1.0.0-alpha2
info:
  label: Magento REST API — Stores
  description: 'Magento REST API — Stores. 1 operations. Lead operation: List store configurations. Self-contained Naftiko
    capability covering one Magento business surface.'
  tags:
  - Magento
  - Stores
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    MAGENTO_API_KEY: MAGENTO_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-stores
    baseUri: https://{store_domain}/rest/{store_code}
    description: Magento REST API — Stores business capability. Self-contained, no shared references.
    resources:
    - name: V1-store-storeConfigs
      path: /V1/store/storeConfigs
      operations:
      - name: liststoreconfigs
        method: GET
        description: List store configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.MAGENTO_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-stores-rest
    port: 8080
    description: REST adapter for Magento REST API — Stores. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/v1/store/storeconfigs
      name: v1-store-storeconfigs
      description: REST surface for V1-store-storeConfigs.
      operations:
      - method: GET
        name: liststoreconfigs
        description: List store configurations
        call: rest-stores.liststoreconfigs
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-stores-mcp
    port: 9090
    transport: http
    description: MCP adapter for Magento REST API — Stores. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-store-configurations
      description: List store configurations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-stores.liststoreconfigs
      outputParameters:
      - type: object
        mapping: $.
